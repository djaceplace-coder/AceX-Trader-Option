<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<title>Withdraw — Acextraderoption</title>
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<header class="app-header">
  <div class="logo-wrap">
    <img src="../assets/img/logo.png" alt="Acextraderoption" class="logo-img" onerror="this.style.display='none'">
    <span class="logo-text">ACEXTRADER</span>
  </div>
</header>
<div class="sidebar"></div>
<nav class="bottom-nav"></nav>
<main class="main-content">
<script>
(async () => {
  if (!(await ACE.requireAuth())) return;
  const unlocked = await ACE.checkWithdrawalUnlock();
  const lockMsg = document.getElementById('lock-message');
  const form = document.getElementById('withdrawForm');
  if (!unlocked) {
    lockMsg.classList.remove('hidden');
    form.classList.add('hidden');
  } else {
    lockMsg.classList.add('hidden');
    form.classList.remove('hidden');
  }

  const profile = await ACE.getProfile();
  const { data: wallets } = await supabase.from('wallets').select('*').eq('user_id', profile.id);
  const select = document.getElementById('asset');
  select.innerHTML = (wallets || []).map(w => `<option value="${w.asset}">${w.asset} — Balance: ${w.balance}</option>`).join('');
})();

document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const amount = parseFloat(document.getElementById('amount').value);
  const asset = document.getElementById('asset').value;
  const address = document.getElementById('address').value;
  if (!amount || amount <= 0) { ACE.showToast('Enter a valid amount', 'error'); return; }
  if (!address.trim()) { ACE.showToast('Enter destination address', 'error'); return; }
  const ok = await ACE.submitWithdrawal(amount);
  if (ok) {
    document.getElementById('withdrawForm').reset();
  }
});
</script>

<div class="animate-fade-up">
  <h2 class="fs-24 fw-700 mb-2">Withdraw Funds</h2>
  <p class="fs-14 text-muted mb-6">Withdrawals are processed after admin approval.</p>

  <div id="lock-message" class="gate-overlay mb-6 hidden">
    <div class="gate-icon">🔒</div>
    <h3 class="fs-20 fw-700 mb-2">Withdrawal Locked</h3>
    <p class="fs-14 text-muted mb-4">Your portfolio value must reach <strong class="text-gold">$5,000</strong> to enable withdrawals.</p>
    <div class="divider"></div>
    <p class="fs-12 text-muted mb-4">To continue, you can:</p>
    <div class="flex gap-3 justify-center">
      <a href="deposit.html" class="btn btn-primary" style="width:auto">Deposit More</a>
      <a href="../bots/" class="btn btn-secondary" style="width:auto">Switch Bots</a>
    </div>
  </div>

  <form id="withdrawForm" class="card" style="max-width:480px;">
    <div class="input-group">
      <label class="input-label">Asset</label>
      <select class="input" id="asset">
        <option>Loading...</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">Amount</label>
      <input type="number" class="input" id="amount" placeholder="0.00" step="any" required>
    </div>
    <div class="input-group">
      <label class="input-label">Destination Address</label>
      <input type="text" class="input" id="address" placeholder="Enter wallet address" required>
    </div>
    <button type="submit" class="btn btn-danger" id="withdrawBtn">Request Withdrawal</button>
    <div class="fs-12 text-muted mt-4 text-center">All withdrawals require manual admin approval for security.</div>
  </form>
</div>
</main>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/app.js"></script>
</body>
</html>
