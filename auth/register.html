<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<title>Register — Acextraderoption</title>
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<header class="app-header">
  <div class="logo-wrap">
    <img src="../assets/img/logo.png" alt="Acextraderoption" class="logo-img" onerror="this.style.display='none'">
    <span class="logo-text">ACEXTRADER</span>
  </div>
</header>
<main class="main-content">
<div class="form-card animate-fade-up" style="margin-top:2rem;">
  <div class="form-title">
    <h2>Create Account</h2>
    <p>Start trading with Acextraderoption</p>
  </div>
  <form id="regForm">
    <div class="input-group">
      <label class="input-label">Full Name</label>
      <input type="text" class="input" id="fullName" placeholder="John Doe" required>
    </div>
    <div class="input-group">
      <label class="input-label">Email Address</label>
      <input type="email" class="input" id="email" placeholder="you@example.com" required>
    </div>
    <div class="input-group">
      <label class="input-label">Password</label>
      <input type="password" class="input" id="password" placeholder="Min 8 characters" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary" id="regBtn">Create Account</button>
    <div class="text-center mt-4">
      <a href="login.html" class="fs-14 text-muted" style="text-decoration:none;">Already have an account? <span class="text-gold">Sign In</span></a>
    </div>
  </form>
</div>
</main>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById('regForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.innerHTML = '<div class="loader"></div>';
  const { data, error } = await supabase.auth.signUp({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    options: { data: { full_name: document.getElementById('fullName').value } }
  });
  if (error) {
    ACE.showToast(error.message, 'error');
    btn.textContent = 'Create Account';
  } else {
    ACE.showToast('Account created. Welcome.', 'success');
    setTimeout(() => location.href = '../dashboard/', 800);
  }
});
</script>
</body>
</html>
