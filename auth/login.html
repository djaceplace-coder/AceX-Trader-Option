<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#06080f">
<title>Sign In — Acextraderoption</title>
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<header class="app-header">
  <div class="logo-wrap">
    <img src="../assets/img/logo.png" alt="Acextraderoption" class="logo-img" onerror="this.style.display='none'">
    <span class="logo-text">ACEXTRADER</span>
  </div>
</header>
<main class="main-content">
<div class="form-card animate-fade-up" style="margin-top:2rem;">
  <div class="form-title">
    <h2>Welcome Back</h2>
    <p>Sign in to your Acextrader account</p>
  </div>
  <form id="loginForm">
    <div class="input-group">
      <label class="input-label">Email Address</label>
      <input type="email" class="input" id="email" placeholder="you@example.com" required>
    </div>
    <div class="input-group">
      <label class="input-label">Password</label>
      <input type="password" class="input" id="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
    <div class="text-center mt-4">
      <a href="register.html" class="fs-14 text-muted" style="text-decoration:none;">Don't have an account? <span class="text-gold">Register</span></a>
    </div>
  </form>
</div>
</main>
<script src="../assets/js/supabase-config.js"></script>
<script src="../assets/js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<div class="loader"></div>';
  const { data, error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value
  });
  if (error) {
    ACE.showToast(error.message, 'error');
    btn.textContent = 'Sign In';
  } else {
    ACE.showToast('Signed in successfully', 'success');
    setTimeout(() => location.href = '../dashboard/', 600);
  }
});
</script>
</body>
</html>
